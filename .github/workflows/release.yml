name: "Application release"

env:
  APP_NAME: "MinecraftNotes"
  TARGET_FRAMEWORK: "net9.0"
  DOTNET_VERSION: "9.0"

on:
  push:
    tags:
      - '*'

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag"
        type: string
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            ext: zip
          - os: windows-latest
            rid: win-arm64
            ext: zip
          - os: macos-latest
            rid: osx-x64
            ext: zip
          - os: macos-latest
            rid: osx-arm64
            ext: zip
          - os: ubuntu-latest
            rid: linux-x64
            ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore solution
        run: dotnet restore

      - name: Publish application
        run: dotnet publish ${{ env.APP_NAME }}/${{ env.APP_NAME }}.csproj -c Release -f ${{ env.TARGET_FRAMEWORK }} -r ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=false -p:PublishReadyToRun=true -o './publish-${{ matrix.rid }}'

      - name: Package artifacts
        shell: bash
        run: |
          ARCHIVE_NAME="${{ env.APP_NAME }}-${{ matrix.rid }}"

          mkdir -p artifacts

          if [ "${{ matrix.ext }}" = "zip" ]; then
            cd "./publish-${{ matrix.rid }}"
            7z a -tzip "../artifacts/${ARCHIVE_NAME}.zip" .
          elif [ "${{ matrix.ext }}" = "tar.gz" ]; then
            tar -czf "artifacts/${ARCHIVE_NAME}.tar.gz" -C "./publish-${{ matrix.rid }}" .
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.rid }}
          path: artifacts/*
          if-no-files-found: error

  publish-release:
    needs: build

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: v${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/binaries-*/*.zip
            release-artifacts/binaries-*/*.tar.gz